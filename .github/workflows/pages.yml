name: Deploy website to GitHub Pages

# Disabled until website-next is finalized and Pages is enabled on the repo.
# Re-enable by restoring the push trigger AND enabling Pages via:
#   gh api -X POST repos/serialpilot/serialpilot/pages -f 'source[branch]=main'
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
