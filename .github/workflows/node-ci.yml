name: Node CI

on:
  push:
    branches: [main, master]
    paths:
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'lerna.json'
      - 'tsconfig*.json'
      - 'eslint.config.mjs'
      - '.github/workflows/node-ci.yml'
  pull_request:
    paths:
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'lerna.json'
      - 'tsconfig*.json'
      - 'eslint.config.mjs'
      - '.github/workflows/node-ci.yml'
  workflow_dispatch:

jobs:
  build-test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Linux build prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev build-essential

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
